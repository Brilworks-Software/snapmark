<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SnapMark</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect width="22" height="22" rx="5" fill="#1E1E2E"/>
          <rect x="4" y="4" width="6" height="6" rx="1" fill="#3B82F6"/>
          <rect x="12" y="4" width="6" height="6" rx="1" fill="#6366F1"/>
          <rect x="4" y="12" width="6" height="6" rx="1" fill="#10B981"/>
          <rect x="12" y="12" width="6" height="6" rx="1" fill="#F59E0B" opacity="0.7"/>
        </svg>
        <span class="logo-text">SnapMark</span>
      </div>
      <span class="version">v1.0</span>
    </header>

    <div class="capture-section">
      <p class="section-label">Capture mode</p>

      <button class="capture-btn primary" id="btnRegion">
        <div class="btn-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M3 9V5a2 2 0 0 1 2-2h4M3 15v4a2 2 0 0 0 2 2h4M21 9V5a2 2 0 0 0-2-2h-4M21 15v4a2 2 0 0 1-2 2h-4"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-title">Region</span>
          <span class="btn-desc">Drag to select any area</span>
        </div>
        <kbd>R</kbd>
      </button>

      <button class="capture-btn" id="btnVisible">
        <div class="btn-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M8 20h8M12 16v4"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-title">Visible area</span>
          <span class="btn-desc">Current viewport</span>
        </div>
        <kbd>V</kbd>
      </button>

      <button class="capture-btn" id="btnFullPage">
        <div class="btn-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="2" width="20" height="20" rx="2"/>
            <line x1="2" y1="8" x2="22" y2="8"/>
            <line x1="2" y1="16" x2="22" y2="16"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-title">Full page</span>
          <span class="btn-desc">Scroll &amp; stitch <span class="pro-tag">Pro</span></span>
        </div>
        <kbd>F</kbd>
      </button>
    </div>

    <div class="divider"></div>

    <div class="recents-section" id="recentsSection">
      <p class="section-label">Recent captures</p>
      <div id="recentsList" class="recents-list">
        <p class="empty-state">No captures yet</p>
      </div>
    </div>

    <footer class="footer">
      <span>by <strong>Brilworks</strong></span>
      <a href="#" id="settingsLink">Settings</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
