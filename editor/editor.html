<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SnapMark Editor</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div id="app">

    <!-- Top toolbar -->
    <header id="toolbar">
      <div class="toolbar-left">
        <div class="logo-mini">
          <img src="../icons/icon32.png" alt="SnapMark" width="18" height="18">
          <span>SnapMark</span>
        </div>
        <div class="divider-v"></div>
        <span id="imageDimensions" class="dim-badge">0 × 0</span>
      </div>

      <div class="toolbar-center" id="toolBar">
        <!-- Inject tools via JS -->
      </div>

      <div class="toolbar-right">
        <div class="color-row" id="colorRow">
          <!-- Inject color swatches via JS -->
        </div>
        <div class="divider-v"></div>
        <div class="size-row">
          <input type="range" id="strokeSize" min="1" max="20" value="3" step="1">
        </div>
        <div class="divider-v"></div>
        <button class="action-btn" id="btnUndo" title="Undo (Ctrl+Z)" disabled>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
        </button>
        <div class="divider-v"></div>
        <button class="action-btn" id="btnShare" title="Upload and get link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Share
        </button>
        <button class="action-btn primary" id="btnCopy" title="Copy to clipboard">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
        <button class="action-btn success" id="btnDownload" title="Download PNG">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </button>
      </div>
    </header>

    <!-- Canvas area -->
    <main id="canvasArea">
      <div id="canvasWrapper">
        <canvas id="baseCanvas"></canvas>   <!-- screenshot layer -->
        <canvas id="drawCanvas"></canvas>   <!-- annotation layer -->
        <canvas id="cursorCanvas"></canvas> <!-- cursor preview layer -->
      </div>
      <div id="loadingState">
        <div class="spinner"></div>
        <p>Loading screenshot…</p>
      </div>
      <div id="textInput" style="display:none">
        <textarea id="textInputArea" placeholder="Type here…" rows="1"></textarea>
      </div>
    </main>

    <!-- Toast -->
    <div id="toast"></div>
  </div>

  <!-- Supabase Client & Config -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="editor.js"></script>
</body>
</html>
